{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Voting System{% endblock %}

{% block content %}
<div class="gradient-bg">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 30px;">Welcome Back</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login to Vote</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--accent-color); font-weight: 600;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
